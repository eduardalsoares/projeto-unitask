<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unitask | Calendário</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="../assets/icons/logo.svg">
    <link rel="stylesheet" href="../css/calendario.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
</head>
<body>
    <div class="layout">

        <aside id="menu-lateral">
            <div class="menu-titulo">
                <img src="../assets/icons/logo.png" alt="Unitask Logo">
                <h1>Unitask</h1>
            </div>
            <div class="menu-btn">
                <button class="btn-hoje" id="btnHoje">Hoje</button>
                <button class="btn-tarefas" id="btnTarefas">Tarefas</button>
                <button class="btn-calendario" id="btnCalendario">Calendário</button>
                <button class="btn-dashboard" id="btnDashboard">Dashboard</button>
                <button class="btn-perfil" id="btnPerfil">Perfil</button>
            </div>
        </aside>
       

    
        <main>
        <header>
            <span></span>
            <div>
            <button id="btnNovaTarefa" class="btn-nova-tarefa">Nova Tarefa</button>
            <button id="btnSair">Sair</button>
            </div>
        </header>
        
        <div class="conteudo">
            <h1>Calendário de Atividades</h1>
            <p>Visualize suas atividades</p>
        </div>
        <div id="calendar"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

    <script src="../js/calendario.js"></script>

</body>
</html>
