<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unitask | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,100..1000&family=Poppins:wght@100..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="../assets/icons/logo.svg">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

    <div class="layout">

        <aside id="menu-lateral">
            <div class="menu-titulo">
                <img src="../assets/icons/logo.png" alt="Unitask Logo">
                <h1>Unitask</h1>
            </div>
            <div class="menu-btn">
                <button id="btnHoje" class="btn-hoje">Hoje</button>
                <button id="btnTarefas" class="btn-tarefas">Tarefas</button>
                <button id="btnCalendario" class="btn-calendario">Calendário</button>
                <button id="btnDashboard" class="btn-dashboard active">Dashboard</button>
                <button id="btnPerfil" class="btn-perfil">Perfil</button>
            </div>
        </aside>

        <main>
            <header class="topo-sistema">
                <span>Dashboard</span>
                <div>
                    <button id="btnNovaTarefa" class="btn-nova-tarefa">Nova Tarefa</button>
                    <button id="btnSair">Sair</button>
                </div>
            </header>

            <div class="conteudo-principal">

                <section class="introducao-pagina">
                    <h1>Dashboard</h1>
                    <p>Acompanhe o progresso das suas atividades</p>
                </section>

                <!-- Cards de resumo -->
                <div class="container-cards">
                    <div class="card">
                        <span id="qtdTotal">0</span>
                        <p>Total de Tarefas</p>
                    </div>
                    <div class="card">
                        <span id="qtdConcluidas">0</span>
                        <p>Concluídas</p>
                    </div>
                    <div class="card">
                        <span id="qtdAndamento">0</span>
                        <p>Em Andamento</p>
                    </div>
                    <div class="card">
                        <span id="qtdPendentes">0</span>
                        <p>Pendentes</p>
                    </div>
                </div>

                <!-- Gráficos -->
                <div class="grid-dashboard">

                    <section class="card-painel">
                        <h2>Tarefas por Status</h2>
                        <div class="grafico-container">
                            <canvas id="graficoPizza"></canvas>
                        </div>
                    </section>

                    <section class="card-painel">
                        <h2>Tarefas por Prioridade</h2>
                        <div class="grafico-container">
                            <canvas id="graficoBarras"></canvas>
                        </div>
                    </section>

                </div>

            </div>
        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/script.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
