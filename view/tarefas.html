<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniTask | Tarefas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="../assets/icons/logo.svg">
    <link rel="stylesheet" href="../css/tarefas.css">
</head>
<body>

    <div class="layout">

        <aside id="menu-lateral">
            <div class="menu-titulo">
                <img src="../assets/icons/logo.png" alt="Unitask Logo">
                <h1>Unitask</h1>
            </div>
            <div class="menu-btn">
                <button id="btnHoje" class="btn-hoje">Hoje</button>
                <button id="btnTarefas" class="btn-tarefas active">Tarefas</button>
                <button id="btnCalendario" class="btn-calendario">Calendário</button>
                <button id="btnDashboard" class="btn-dashboard">Dashboard</button>
                <button id="btnPerfil" class="btn-perfil">Perfil</button>
            </div>
        </aside>
        
        <main>
            <header class="topo-sistema">
                <span>Tarefas</span>
                <div>
                    <button id="btnNovaTarefa" class="btn-nova-tarefa">Nova Tarefa</button>
                    <button id="btnSair">Sair</button>
                </div>
            </header>

            <div class="conteudo-principal">
                
                <section class="introducao-pagina">
                    <h1>Cadastre suas tarefas</h1>
                    <p>Organize suas atividades acadêmicas</p>
                </section>

                <div class="grid-tarefas">
                    <section class="card-painel">
                        <h2>Nova Tarefa</h2>
                        <form id="form-tarefa">
                            <label for="titulo">Título</label>
                            <input type="text" id="titulo" placeholder="Projetos | Estudos">
                            
                            <label for="descricao">Descrição</label>
                            <textarea id="descricao" placeholder="Lista de exercícios"></textarea>

                            <div class="campos-alinhados">
                                <div>
                                    <label for="prazo">Prazo</label>
                                    <input type="date" id="prazo">
                                </div>
                                <div>
                                    <label for="prioridade">Prioridade</label>
                                    <select id="prioridade">
                                        <option value="">Selecione</option>
                                        <option value="baixa">Baixa</option>
                                        <option value="media">Média</option>
                                        <option value="alta">Alta</option>
                                    </select>
                                </div>
                            </div>

                            <label for="status">Status</label>
                            <select id="status">
                                <option value="afazer">A fazer</option>
                                <option value="andamento">Em andamento</option>
                                <option value="feito">Feito</option>
                            </select>
                            
                            <button type="submit" class="btn-enviar">Adicionar tarefa</button>
                        </form>
                    </section>

                    <section class="card-painel">
                        <h2>Minhas Tarefas</h2>
                        <ul id="lista-tarefas">
                            </ul>
                    </section>
                </div>

            </div> 
        </main>

    </div>
    <div id="modal-editar" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; font-family: 'Poppins', sans-serif;">
        <div style="background: white; padding: 24px; border-radius: 8px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1);">
            <h2 style="color: #063A5D; margin: 0; font-size: 1.5rem;">Editar Atividade</h2>
            
            <input type="hidden" id="editar-id">

            <label style="color: #063A5D; font-weight: 500; margin-bottom: -6px;">Título</label>
            <input type="text" id="editar-titulo" style="padding: 10px; border: 1px solid #ced4da; border-radius: 6px; font-family: inherit;">

            <label style="color: #063A5D; font-weight: 500; margin-bottom: -6px;">Descrição</label>
            <textarea id="editar-descricao" style="padding: 10px; border: 1px solid #ced4da; border-radius: 6px; font-family: inherit; height: 80px; resize: none;"></textarea>

            <label style="color: #063A5D; font-weight: 500; margin-bottom: -6px;">Status</label>
            <select id="editar-status" style="padding: 10px; border: 1px solid #ced4da; border-radius: 6px; font-family: inherit; background: white;">
                <option value="afazer">A fazer</option>
                <option value="andamento">Em andamento</option>
                <option value="feito">Feito</option>
            </select>

            <div style="display: flex; gap: 12px; margin-top: 12px;">
                <button id="btn-salvar-edicao" style="flex: 1; padding: 12px; background: #063A5D; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-family: inherit;">Salvar</button>
                <button id="btn-fechar-modal" style="flex: 1; padding: 12px; background: #e2e8f0; color: #4a7a8a; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-family: inherit;">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="../js/script.js"></script>
    <script src="../js/tarefas.js"></script>
</body>
</html>
