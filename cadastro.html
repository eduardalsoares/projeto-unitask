<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>
    <main class="container">
        <section class="card-cadastro">
            <h1>Cadastro</h1>
            <form id="form-cadastro">
                <label for="novo-nome">Nome</label>
                <input type="text" id="novo-nome" placeholder="Digite seu nome">

                <label for="novo-email">Email</label>
                <input type="email" id="novo-email" placeholder="Digite seu email">

                <label for="curso">Curso</label>
                <input type="text" id="curso" placeholder="Digite seu curso">

                <button type="submit">Cadastrar</button>
            </form>
            <a href="index.html">Voltar para login</a>
        </section>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
